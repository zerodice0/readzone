  <text x="120" y="176" class="title">Mineral Archive</text>
  <text x="120" y="225" class="body">책 표지를 보석처럼 세팅하고, 금속성 테두리와 미세한 광택으로 고급 독서 아카이브 분위기를 만드는 방향</text>

