<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1700" viewBox="0 0 2400 1700" fill="none">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="26" stdDeviation="28" flood-color="#15130f" flood-opacity="0.14"/>
    </filter>
    <filter id="smallShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#211d17" flood-opacity="0.12"/>
    </filter>
    <filter id="texture">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.055"/>
      </feComponentTransfer>
    </filter>
    <linearGradient id="pageBg" x1="0" x2="2400" y1="0" y2="1700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F9F4EA"/>
      <stop offset="0.45" stop-color="#F7F0E3"/>
      <stop offset="1" stop-color="#EEF4F0"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0" x2="1" y1="0" y2="0">
      <stop stop-color="#A97722"/>
      <stop offset="0.5" stop-color="#F0C36B"/>
      <stop offset="1" stop-color="#8C641D"/>
    </linearGradient>
    <linearGradient id="onyx" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#1F2623"/>
      <stop offset="0.55" stop-color="#111513"/>
      <stop offset="1" stop-color="#2A2018"/>
    </linearGradient>
    <linearGradient id="opal" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#FAFDFA"/>
      <stop offset="0.45" stop-color="#F2EEE4"/>
      <stop offset="1" stop-color="#E6F2EC"/>
    </linearGradient>
    <linearGradient id="emerald" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#0F6D57"/>
      <stop offset="1" stop-color="#083D36"/>
    </linearGradient>
    <linearGradient id="ruby" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#A83245"/>
      <stop offset="1" stop-color="#631D2B"/>
    </linearGradient>
    <linearGradient id="sapphire" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#315A84"/>
      <stop offset="1" stop-color="#182D48"/>
    </linearGradient>
    <style>
      .label { font: 600 30px Inter, -apple-system, BlinkMacSystemFont, sans-serif; fill: #6B6255; letter-spacing: 0; }
      .title { font: 800 58px Georgia, 'Times New Roman', serif; fill: #211D17; letter-spacing: 0; }
      .h1 { font: 800 42px Georgia, 'Times New Roman', serif; fill: #1F1B16; letter-spacing: 0; }
      .h2 { font: 700 26px Inter, -apple-system, BlinkMacSystemFont, sans-serif; fill: #211D17; letter-spacing: 0; }
      .body { font: 500 20px Inter, -apple-system, BlinkMacSystemFont, sans-serif; fill: #70685D; letter-spacing: 0; }
      .small { font: 500 16px Inter, -apple-system, BlinkMacSystemFont, sans-serif; fill: #766E63; letter-spacing: 0; }
      .tiny { font: 600 13px Inter, -apple-system, BlinkMacSystemFont, sans-serif; fill: #81786B; letter-spacing: 0; }
      .micro { font: 700 11px Inter, -apple-system, BlinkMacSystemFont, sans-serif; fill: #8A8070; letter-spacing: .5px; }
      .screen { fill: #FFFDF8; stroke: #D9CAB2; stroke-width: 1.4; filter: url(#softShadow); }
      .card { fill: #FFFDF8; stroke: #E2D6C3; stroke-width: 1.2; }
      .goldStroke { stroke: url(#goldLine); stroke-width: 1.8; }
    </style>
